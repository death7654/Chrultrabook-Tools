<div class="row">
  <div class="col-12 text-center pt-3 pb-2">
    <h4 class="fs-3">Diagnostics</h4>
  </div>
</div>

<div class="row">
  <div class="col-12 g-1">
    <select class="form-select text-white border-0 fs-4 pt-1 bg-secondary rounded-1" id="diagnostic_dropdown"
      [(ngModel)]="selected_function" #dropdown>
      <option (value)="undefined" selected>Select</option>
      @for (item of diagModes; track $index) {
      <option (value)="item[0]">{{item[1]}}</option>
      }
    </select>
    <!-- TODO below -->
    <div class="button1">
      <button class="btn btn-outline-secondary fs-4 btn-border-none  " (click)="select()">
        Generate Report
      </button>
    </div>
    <div class="button2">
      <button class="btn btn-outline-secondary fs-4 btn-border-none  " (click)="save()">
        Save to Files
      </button>
    </div>
  </div>
  <div class="p-1 m-2 mt-0 mb-0 pb-1 rounded-3 overflow-auto bg-light">
    <button class="btn btn-outline-light btn-border-none position-absolute copy" (click)="copy_to_clipboard()">
      <img class="p-0" src="../../assets/diagnostics/copy.svg" alt="copy" />
    </button>
    <div class="box fs-4 font-monospace m-2">
      <span>{{ collected_info }}</span>
    </div>
  </div>
</div>
